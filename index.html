<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  nav {

  /* ── PHOTO CLUSTER ── */
  /* Left ~15% from left edge, vertically centered */
  .photo-cluster {
    position: absolute;
    left: 14%;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    height: 250px;
  }

    left: 28px;

    object-position: center top;
    border-radius: 20px;
    z-index: 2;
  }

  .photo-plant {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 118px;
    height: 135px;
    object-fit: cover;
    object-position: center top;
    border-radius: 14px;
    z-index: 3;

    font-size: 0.95rem;
    color: #999;
    letter-spacing: -0.06em;
    line-height: 1.6;
  }

  /* ── SITE LINKS ── */
  /* Right half of page, vertically centered */
  .site-links {
    position: absolute;
    left: 51%;
    top: 50%;
    transform: translateY(-55%);
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }

  .site-links li a {
    font-family: 'Caveat', cursive;
    font-size: 2.5rem;
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .site-links li a .arr {
    color: #aaa;
    font-size: 1.4rem;
    letter-spacing: -0.06em;
    font-weight: 400;
  }

  .site-links li a:hover { color: #555; }

  /* ── 3D AVATAR ── */
  .avatar-wrap {
    position: absolute;
    bottom: -20px;
    right: -10px;
    width: 28vw;
    max-width: 300px;
    min-width: 160px;
    z-index: 5;
    pointer-events: none;
  }

  .avatar-wrap img {
    width: 100%;
    display: block;
    object-fit: contain;
    object-position: bottom right;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  nav            { animation: fadeIn 0.5s ease 0s both; }
  .photo-cluster { animation: fadeIn 0.6s ease 0.1s both; }
  .site-links    { animation: fadeIn 0.6s ease 0.2s both; }
  .avatar-wrap   { animation: fadeIn 0.7s ease 0.3s both; }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
