<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ebe2;
    font-family: 'Caveat', cursive;
    -webkit-font-smoothing: antialiased;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* ── NAV ── */
  nav {
    position: absolute;
    top: 3vh;
    left: 3.5vw;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }

  .nav-logo {
    height: clamp(30px, 5vh, 44px);
    width: auto;
    mix-blend-mode: multiply;
  }

  .nav-name {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.1rem, 2.2vw, 1.5rem);
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
  }

  /* ── CONTENT: photos + links, centered together vertically ── */
  .content {
    position: absolute;
    top: 44%;
    left: 7vw;
    transform: translateY(-50%);
    display: flex;
    align-items: flex-start;
    gap: clamp(3.5rem, 13vw, 12rem);
    z-index: 5;
  }

  /* push links up so "Music" sits near the top of the photo cluster */
  .site-links { margin-top: -1vh; }

  /* ── PHOTO CLUSTER ── */
  .photo-cluster {
    position: relative;
    width: clamp(200px, 21vw, 310px);
    height: clamp(260px, 28vw, 410px);
    flex-shrink: 0;
  }

  .photo-you {
    position: absolute;
    top: 0;
    left: 0;
    width: 70%;
    height: 76%;
    object-fit: cover;
    object-position: center top;
    border-radius: clamp(16px, 2vw, 26px);
    z-index: 3;
  }

  .photo-plant {
    position: absolute;
    top: 40%;
    left: 38%;
    width: 62%;
    height: 56%;
    object-fit: cover;
    object-position: center center;
    border-radius: clamp(14px, 1.6vw, 22px);
    z-index: 1;
  }

  /* CASCADING ARROWS — over the portrait's right-center */
  .arrows { z-index: 4; }

  .arrows span {
    position: absolute;
    font-family: 'Caveat', cursive;
    font-size: clamp(1rem, 1.5vw, 1.4rem);
    font-weight: 700;
    color: #1a1a1a;
  }
  .arrows span:nth-child(1) { top: 30%; left: 48%; }
  .arrows span:nth-child(2) { top: 41%; left: 52%; }
  .arrows span:nth-child(3) { top: 52%; left: 56%; }

  /* ── SITE LINKS — big ── */
  .site-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: clamp(1.8rem, 6vh, 4rem);
  }

  .site-links li a {
    font-family: 'Caveat', cursive;
    font-size: clamp(3rem, 7vw, 6rem);
    font-weight: 600;
    color: #1a1a1a;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 14px;
    line-height: 1;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .site-links li a .arr {
    color: #1a1a1a;
    font-size: clamp(1.8rem, 4vw, 3.4rem);
    font-weight: 600;
  }

  .site-links li a:hover { color: #555; }

  /* ── 3D AVATAR — only TOP of head shows, cropped at viewport bottom ── */
  .avatar-wrap {
    position: absolute;
    bottom: 0;
    right: 1vw;
    width: clamp(300px, 34vw, 560px);
    height: 46vh;          /* visible window — image is taller, so bottom crops */
    overflow: hidden;      /* hides the lower face / shoulders */
    z-index: 1;
    pointer-events: none;
    line-height: 0;
  }

  .avatar-wrap img {
    width: 100%;
    height: auto;
    display: block;
    /* image sits at top of window; everything below the window is cut off */
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  nav          { animation: fadeIn 0.5s ease 0s both; }
  .content     { animation: fadeIn 0.6s ease 0.12s both; }
  .avatar-wrap { animation: fadeIn 0.7s ease 0.25s both; }

  /* ── TABLET ── */
  @media (max-width: 900px) {
    .content { gap: clamp(2.5rem, 8vw, 6rem); }
    .photo-cluster { width: 34vw; height: 46vw; }
    .site-links li a { font-size: clamp(2.6rem, 7vw, 4.5rem); }
    .site-links li a .arr { font-size: clamp(1.4rem, 4vw, 2.6rem); }
    .avatar-wrap { width: 42vw; height: 42vh; }
  }

  /* ── PHONE (matches mobile reference) ── */
  @media (max-width: 600px) {
    nav { top: 2.5vh; left: 5vw; }

    /* photos + text stay SIDE BY SIDE, up near the top */
    .content {
      top: 14vh;
      left: 5vw;
      right: 5vw;
      transform: none;
      align-items: center;
      gap: 4vw;
    }

    .photo-cluster {
      width: 40vw;
      height: 52vw;
    }

    .arrows span { font-size: 0.85rem; }
    .arrows span:nth-child(1) { top: 28%; left: 46%; }
    .arrows span:nth-child(2) { top: 40%; left: 50%; }
    .arrows span:nth-child(3) { top: 52%; left: 54%; }

    .site-links { gap: 3.5vh; }
    .site-links li a { font-size: clamp(1.8rem, 7vw, 2.6rem); }
    .site-links li a .arr { font-size: clamp(1rem, 4vw, 1.5rem); gap: 6px; }

    /* avatar: big, bottom, only top of head shows (cropped) */
    .avatar-wrap {
      width: 88vw;
      max-width: 460px;
      right: 0;
      left: auto;
      bottom: 0;
      height: 34vh;
    }
  }

  /* very small phones */
  @media (max-width: 380px) {
    .content { top: 12vh; }
    .site-links li a { font-size: 1.7rem; }
    .avatar-wrap { width: 94vw; height: 30vh; }
  }
</style>
