<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Prince Ube — Ube Soul">
<meta name="twitter:image" content="https://is1-ssl.mzstatic.com/image/thumb/Music211/v4/87/1b/1d/871b1d60-0047-4f94-617c-e6d6058350b6/artwork.jpg/1200x630wp-60.jpg">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Prince Ube",
  "url": "https://princeube.com",
  "description": "Prince Ube is a Minneapolis-born, Atlanta-raised artist making ube soul — Y2K luxury rap with jazz textures and lo-fi warmth.",
  "genre": ["Ube Soul", "Y2K Luxury Rap", "Jazz Rap"],
  "sameAs": [
    "https://linktr.ee/princeube",
    "https://open.spotify.com/artist/5mqn8zSDBZ08bpNrixc2WE",
    "https://music.apple.com/us/artist/prince-ube/1718194640",
    "https://instagram.com/prince_ube_",
    "https://youtube.com/@prince_ube",
    "https://soundcloud.com/prince-ube",
    "https://princeube.bandcamp.com"
  ]
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: #f2ede6;
    font-family: 'Caveat', cursive;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav {
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.65rem;
  }

  .nav-logo {
    height: 38px;
    width: auto;
    display: block;
    /* keep the black logo visible on cream */
    mix-blend-mode: multiply;
  }

  .nav-name {
    font-family: 'Caveat', cursive;
    font-size: 1.35rem;
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
    letter-spacing: 0.01em;
  }

  /* ── MAIN CONTENT ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    padding: 0.5rem 2rem 3rem;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .photo-cluster {
    position: relative;
    width: 280px;
    height: 300px;
    margin-bottom: 3rem;
  }

  .photo-you {
    position: absolute;
    top: 0;
    left: 40px;
    width: 175px;
    height: 200px;
    object-fit: cover;
    object-position: center top;
    border-radius: 20px;
    z-index: 2;
  }

  .photo-plant {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 140px;
    height: 160px;
    object-fit: cover;
    border-radius: 16px;
    z-index: 1;
    opacity: 0.88;
  }

  .arrows {
    position: absolute;
    top: 80px;
    left: 210px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 3;
  }

  .arrows span {
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    color: #888;
    letter-spacing: -0.04em;
    line-height: 1.3;
  }

  .site-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .site-links li a {
    font-family: 'Caveat', cursive;
    font-size: 2.4rem;
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: color 0.18s;
    line-height: 1.15;
  }

  .site-links li a .arr {
    color: #888;
    font-size: 1.6rem;
    letter-spacing: -0.04em;
  }

  .site-links li a:hover { color: #444; }

  /* ── RIGHT PANEL ── */
  .panel-right {
    background: #0a0a0a;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 2rem 2.5rem;
    overflow: hidden;
    min-height: 480px;
  }

  .right-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .right-label {
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    font-weight: 400;
    color: rgba(242,237,230,0.7);
    letter-spacing: 0.02em;
    text-decoration: none;
    transition: color 0.18s;
  }
  .right-label:hover { color: rgba(242,237,230,1); }

  .right-sublabel {
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    font-weight: 400;
    color: rgba(242,237,230,0.55);
    text-align: right;
    line-height: 1.3;
  }

  .coming-soon {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .cs-drop {
    font-family: 'Caveat', cursive;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 500;
    color: #f2ede6;
    line-height: 1.1;
  }

  .cs-main {
    font-family: 'Caveat', cursive;
    font-size: clamp(3rem, 7vw, 6rem);
    font-weight: 700;
    color: #f2ede6;
    line-height: 0.9;
    letter-spacing: -0.02em;
  }

  .avatar-wrap {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 52%;
    z-index: 1;
    pointer-events: none;
  }

  .avatar-wrap img {
    width: 100%;
    display: block;
    object-fit: contain;
    object-position: bottom right;
    mix-blend-mode: screen;
    opacity: 0.85;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }
  .photo-cluster  { animation: fadeIn 0.7s ease 0.1s both; }
  .site-links     { animation: fadeIn 0.7s ease 0.25s both; }
  .coming-soon    { animation: fadeIn 0.8s ease 0.35s both; }
  .right-top      { animation: fadeIn 0.7s ease 0.2s both; }

  /* ── MOBILE ── */
  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; }
    .panel-left { padding: 1rem 1.5rem 2.5rem; }
    .photo-cluster { width: 240px; height: 260px; }
    .photo-you { width: 150px; height: 175px; left: 30px; }
    .photo-plant { width: 120px; height: 140px; }
    .arrows { left: 180px; top: 70px; }
    .site-links li a { font-size: 2rem; }
    .panel-right { min-height: 360px; padding: 1.5rem; }
    .cs-main { font-size: clamp(2.8rem, 13vw, 5rem); }
    .cs-drop { font-size: clamp(1.6rem, 6vw, 2.4rem); }
    .avatar-wrap { width: 48%; }
  }
</style>
</head>
<body>

<nav>
  <img class="nav-logo" src="/ube_logo.png" alt="Prince Ube logo">
  <a href="/" class="nav-name">Prince Ube</a>
</nav>

<main>
  <!-- LEFT -->
  <section class="panel-left">
    <div class="photo-cluster">
      <img class="photo-plant"
        src="/zombie-village/cover.jpg"
        alt="Monstera plant"
        onerror="this.style.background='#c8d8c0';this.removeAttribute('src')">
      <img class="photo-you"
        src="/og-image.jpeg"
        alt="Prince Ube"
        onerror="this.style.background='#b0c4d8';this.removeAttribute('src')">
      <div class="arrows">
        <span>>>></span>
        <span>>>></span>
        <span>>>></span>
      </div>
    </div>

    <ul class="site-links">
      <li>
        <a href="https://linktr.ee/princeube" target="_blank" rel="noopener">
          <span class="arr">>>></span>&nbsp;Music
        </a>
      </li>
      <li>
        <a href="/ehorovillage/">
          <span class="arr">>>></span>&nbsp;Ehorovillage
        </a>
      </li>
    </ul>
  </section>

  <!-- RIGHT -->
  <section class="panel-right" aria-label="Ehoro Village teaser">
    <div class="right-top">
      <a href="/ehorovillage/" class="right-label">Ehoro Village</a>
      <div class="right-sublabel">Yoruba<br>Brand</div>
    </div>

    <div class="coming-soon">
      <div class="cs-drop">Drop 1:</div>
      <div class="cs-main">COMING<br>SOON!!!!</div>
    </div>

    <div class="avatar-wrap">
      <img src="/IMG_0406.PNG" alt="Prince Ube 3D avatar" onerror="this.style.display='none'">
    </div>
  </section>
</main>

</body>
</html>
