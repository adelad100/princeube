<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: #f2ede6;
    font-family: 'Caveat', cursive;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav {
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.65rem;
  }

  .nav-logo {
    height: 38px;
    width: auto;
    display: block;
    mix-blend-mode: multiply;
  }

  .nav-name {
    font-family: 'Caveat', cursive;
    font-size: 1.35rem;
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
  }

  /* ── PAGE BODY ── */
  main {
    flex: 1;
    padding: 1rem 2rem 3rem;
    display: flex;
    align-items: flex-start;
    gap: 5vw;
    position: relative;
  }

  /* ── PHOTO CLUSTER (left) ── */
  .photo-cluster {
    position: relative;
    width: 240px;
    height: 280px;
    flex-shrink: 0;
    animation: fadeIn 0.7s ease 0.1s both;
  }

  .photo-you {
    position: absolute;
    top: 0;
    left: 40px;
    width: 168px;
    height: 196px;
    object-fit: cover;
    object-position: center top;
    border-radius: 22px;
    z-index: 2;
  }

  .photo-plant {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 130px;
    height: 150px;
    object-fit: cover;
    border-radius: 16px;
    z-index: 1;
    opacity: 0.88;
  }

  /* >>> to the right of photos */
  .arrows {
    position: absolute;
    top: 90px;
    left: 200px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    z-index: 3;
  }

  .arrows span {
    font-family: 'Caveat', cursive;
    font-size: 1.05rem;
    color: #999;
    letter-spacing: -0.05em;
    line-height: 1.35;
  }

  /* ── RIGHT: nav links + avatar ── */
  .right-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    position: relative;
    min-height: 280px;
  }

  .site-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-top: 2rem;
    animation: fadeIn 0.7s ease 0.25s both;
  }

  .site-links li a {
    font-family: 'Caveat', cursive;
    font-size: clamp(2rem, 4vw, 2.6rem);
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    transition: color 0.18s;
    line-height: 1.2;
  }

  .site-links li a .arr {
    color: #999;
    font-size: 1.4rem;
    letter-spacing: -0.05em;
  }

  .site-links li a:hover { color: #555; }

  /* 3D avatar — bottom right of page */
  .avatar-wrap {
    position: fixed;
    bottom: 0;
    right: 0;
    width: clamp(220px, 28vw, 380px);
    pointer-events: none;
    z-index: 0;
    animation: fadeIn 0.9s ease 0.4s both;
  }

  .avatar-wrap img {
    width: 100%;
    display: block;
    object-fit: contain;
    object-position: bottom right;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    main { flex-direction: column; gap: 2rem; padding: 1rem 1.5rem 2rem; }
    .photo-cluster { width: 210px; height: 240px; }
    .photo-you { width: 145px; height: 168px; left: 30px; }
    .photo-plant { width: 110px; height: 128px; }
    .arrows { left: 172px; top: 75px; }
    .right-col { min-height: auto; }
    .site-links { margin-top: 0; }
    .site-links li a { font-size: 2rem; }
    .avatar-wrap { width: clamp(160px, 42vw, 240px); }
  }
</style>
</head>
<body>

<nav>
  <img class="nav-logo" src="/ube_logo.png" alt="Prince Ube logo">
  <a href="/" class="nav-name">Prince Ube</a>
</nav>

<main>
  <!-- PHOTO CLUSTER -->
  <div class="photo-cluster">
    <img class="photo-plant"
      src="/zombie-village/cover.jpg"
      alt="Monstera plant"
      onerror="this.style.background='#c5d4bc';this.removeAttribute('src')">
    <img class="photo-you"
      src="/og-image.jpeg"
      alt="Prince Ube"
      onerror="this.style.background='#b8c8d8';this.removeAttribute('src')">
    <div class="arrows">
      <span>>>></span>
      <span>>>></span>
      <span>>>></span>
    </div>
  </div>

  <!-- NAV LINKS -->
  <div class="right-col">
    <ul class="site-links">
      <li>
        <a href="https://linktr.ee/princeube" target="_blank" rel="noopener">
          <span class="arr">>>></span>&nbsp;Music
        </a>
      </li>
      <li>
        <a href="/ehorovillage/">
          <span class="arr">>>></span>&nbsp;Ehorovillage
        </a>
      </li>
    </ul>
  </div>

  <!-- 3D AVATAR bottom-right -->
  <div class="avatar-wrap">
    <img src="/IMG_0406.PNG" alt="Prince Ube 3D avatar" onerror="this.style.display='none'">
  </div>
</main>

</body>
