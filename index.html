<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ebe2;
    font-family: 'Caveat', cursive;
    -webkit-font-smoothing: antialiased;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* ── NAV ── */
  nav {
    position: absolute;
    top: 3vh;
    left: 3.5vw;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }

  .nav-logo {
    height: clamp(30px, 5vh, 44px);
    width: auto;
    mix-blend-mode: multiply;
  }

  .nav-name {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.1rem, 2.2vw, 1.5rem);
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
  }

  /* ── CONTENT WRAPPER: holds photos + links side by side ── */
  .content {
    position: absolute;
    top: 14vh;
    left: 5vw;
    display: flex;
    align-items: center;
    gap: clamp(3rem, 8vw, 7rem);
  }

  /* ── PHOTO CLUSTER ── */
  .photo-cluster {
    position: relative;
    width: clamp(180px, 22vw, 280px);
    height: clamp(240px, 30vw, 360px);
    flex-shrink: 0;
  }

  .photo-you {
    position: absolute;
    top: 0;
    left: 14%;
    width: 82%;
    height: 65%;
    object-fit: cover;
    object-position: center top;
    border-radius: clamp(14px, 2vw, 24px);
    z-index: 2;
  }

  .photo-plant {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 65%;
    height: 50%;
    object-fit: cover;
    object-position: center top;
    border-radius: clamp(12px, 1.6vw, 20px);
    z-index: 3;
  }

  .arrows {
    position: absolute;
    top: 34%;
    right: -14%;
    display: flex;
    flex-direction: column;
    gap: 0px;
    z-index: 4;
  }

  .arrows span {
    font-family: 'Caveat', cursive;
    font-size: clamp(0.8rem, 1.2vw, 1.1rem);
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.6;
  }

  /* ── SITE LINKS ── */
  .site-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: clamp(0.6rem, 2vw, 1.6rem);
  }

  .site-links li a {
    font-family: 'Caveat', cursive;
    font-size: clamp(2rem, 4.5vw, 3.6rem);
    font-weight: 600;
    color: #1a1a1a;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .site-links li a .arr {
    color: #1a1a1a;
    font-size: clamp(1.2rem, 2.5vw, 2rem);
    font-weight: 600;
  }

  .site-links li a:hover { color: #555; }

  /* ── 3D AVATAR ── */
  .avatar-wrap {
    position: absolute;
    bottom: -2vh;
    right: -1vw;
    width: clamp(200px, 30vw, 380px);
    z-index: 5;
    pointer-events: none;
  }

  .avatar-wrap img {
    width: 100%;
    display: block;
    object-fit: contain;
    object-position: bottom right;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  nav          { animation: fadeIn 0.5s ease 0s both; }
  .content     { animation: fadeIn 0.6s ease 0.12s both; }
  .avatar-wrap { animation: fadeIn 0.7s ease 0.25s both; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .content {
      top: 12vh;
      left: 5vw;
      right: 5vw;
      gap: 2rem;
    }

    .photo-cluster {
      width: 38vw;
      height: 50vw;
    }

    .site-links li a {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
    }

    .site-links li a .arr {
      font-size: clamp(1rem, 3.5vw, 1.6rem);
    }

    .arrows {
      right: -18%;
    }

    .avatar-wrap {
      width: 42vw;
      bottom: -1vh;
      right: -2vw;
    }
  }

  /* Small phones */
  @media (max-width: 430px) {
    nav {
      top: 2vh;
      left: 4vw;
    }

    .content {
      top: 10vh;
      left: 4vw;
      gap: 1.2rem;
      flex-direction: column;
      align-items: flex-start;
    }

    .photo-cluster {
      width: 55vw;
      height: 65vw;
    }

    .arrows {
      right: -12%;
    }

    .site-links {
      gap: 0.5rem;
    }

    .site-links li a {
      font-size: 2rem;
    }

    .site-links li a .arr {
      font-size: 1.2rem;
    }

    .avatar-wrap {
      width: 50vw;
      bottom: -1vh;
      right: -3vw;
    }
  }
</style>
