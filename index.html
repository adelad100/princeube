<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ebe2;
    font-family: 'Caveat', cursive;
    -webkit-font-smoothing: antialiased;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* ── NAV ── */
  nav {
    position: absolute;
    top: 3vh;
    left: 3.5vw;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }

  .nav-logo {
    height: clamp(30px, 5vh, 44px);
    width: auto;
    mix-blend-mode: multiply;
  }

  .nav-name {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.1rem, 2.2vw, 1.5rem);
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
  }

  /* ── CONTENT: photos (left) + links (right) ── */
  .content {
    position: absolute;
    top: 22vh;
    left: 6vw;
    right: 6vw;
    display: flex;
    align-items: flex-start;
    gap: clamp(3rem, 12vw, 10rem);
  }

  /* ── PHOTO CLUSTER ── */
  .photo-cluster {
    position: relative;
    width: clamp(190px, 20vw, 300px);
    /* taller than wide, room for plant to poke out bottom */
    height: clamp(250px, 27vw, 400px);
    flex-shrink: 0;
  }

  /* PORTRAIT — on TOP, top-left. Face always visible. */
  .photo-you {
    position: absolute;
    top: 0;
    left: 0;
    width: 70%;
    height: 76%;
    object-fit: cover;
    object-position: center top;
    border-radius: clamp(16px, 2vw, 26px);
    z-index: 3;          /* ON TOP of plant */
  }

  /* PLANT — BEHIND portrait, pokes out bottom-right only */
  .photo-plant {
    position: absolute;
    top: 40%;
    left: 38%;
    width: 62%;
    height: 56%;
    object-fit: cover;
    object-position: center center;
    border-radius: clamp(14px, 1.6vw, 22px);
    z-index: 1;          /* BEHIND portrait */
  }

  /* CASCADING ARROWS — staircase down-right over portrait's right edge */
  .arrows { z-index: 4; }

  .arrows span {
    position: absolute;
    font-family: 'Caveat', cursive;
    font-size: clamp(0.9rem, 1.4vw, 1.3rem);
    font-weight: 600;
    color: #1a1a1a;
  }
  /* each arrow steps DOWN and slightly RIGHT */
  .arrows span:nth-child(1) { top: 34%; left: 58%; }
  .arrows span:nth-child(2) { top: 46%; left: 62%; }
  .arrows span:nth-child(3) { top: 58%; left: 66%; }

  /* ── SITE LINKS ── */
  .site-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: clamp(1.2rem, 4vh, 3rem);
    padding-top: 1vh;
  }

  .site-links li a {
    font-family: 'Caveat', cursive;
    font-size: clamp(2.2rem, 4.8vw, 3.8rem);
    font-weight: 600;
    color: #1a1a1a;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
    line-height: 1;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .site-links li a .arr {
    color: #1a1a1a;
    font-size: clamp(1.3rem, 2.6vw, 2.1rem);
    font-weight: 600;
  }

  .site-links li a:hover { color: #555; }

  /* ── 3D AVATAR — FULL head visible, anchored bottom-right ── */
  .avatar-wrap {
    position: absolute;
    bottom: 0;
    right: 0;
    width: clamp(190px, 26vw, 340px);
    z-index: 5;
    pointer-events: none;
    line-height: 0;
  }

  .avatar-wrap img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  nav          { animation: fadeIn 0.5s ease 0s both; }
  .content     { animation: fadeIn 0.6s ease 0.12s both; }
  .avatar-wrap { animation: fadeIn 0.7s ease 0.25s both; }

  /* ── TABLET ── */
  @media (max-width: 768px) {
    .content {
      top: 18vh;
      gap: 2.5rem;
    }
    .photo-cluster {
      width: 40vw;
      height: 54vw;
    }
    .site-links li a { font-size: clamp(2rem, 6vw, 3rem); }
    .site-links li a .arr { font-size: clamp(1.1rem, 3.5vw, 1.7rem); }
    .avatar-wrap { width: 40vw; }
  }

  /* ── PHONE ── */
  @media (max-width: 480px) {
    nav { top: 2.5vh; left: 5vw; }

    .content {
      top: 15vh;
      left: 6vw;
      right: 6vw;
      flex-direction: column;
      align-items: flex-start;
      gap: 2.5rem;
    }

    /* photo cluster bigger on phone so face reads clearly */
    .photo-cluster {
      width: 58vw;
      height: 76vw;
    }

    .arrows span { font-size: 1rem; }

    .site-links { gap: 1.2rem; padding-top: 0; }
    .site-links li a { font-size: 2.2rem; }
    .site-links li a .arr { font-size: 1.3rem; }

    /* avatar bottom-right, full head, smaller */
    .avatar-wrap {
      width: 46vw;
      max-width: 220px;
    }
  }
</style>
</head>
<body>

<nav>
  <img class="nav-logo" src="ube_logo_1000.png" alt="Prince Ube logo">
  <a href="/" class="nav-name">Prince Ube</a>
</nav>

<div class="content">
  <div class="photo-cluster">
    <!-- plant sits BEHIND, pokes out bottom-right -->
    <img class="photo-plant" src="IMG_1766.JPG"  alt="plant">
    <!-- portrait on TOP, face always clear -->
    <img class="photo-you"   src="IMG_1462.jpeg" alt="Prince Ube">
    <!-- cascading arrows -->
    <div class="arrows">
      <span>>>></span>
      <span>>>></span>
      <span>>>></span>
    </div>
  </div>

  <ul class="site-links">
    <li>
      <a href="https://linktr.ee/princeube" target="_blank" rel="noopener">
        <span class="arr">>>></span> Music
      </a>
    </li>
    <li>
      <a href="ehorovillage.html">
        <span class="arr">>>></span> Ehorovillage
      </a>
    </li>
  </ul>
</div>

<div class="avatar-wrap">
  <img src="IMG_0406.PNG" alt="Prince Ube 3D avatar">
</div>

</body>
