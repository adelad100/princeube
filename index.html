<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ebe2;
    font-family: 'Caveat', cursive;
    -webkit-font-smoothing: antialiased;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── NAV: top-left, tight ── */
  nav {
    position: absolute;
    top: 22px;
    left: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }

  .nav-logo {
    height: 34px;
    width: auto;
    mix-blend-mode: multiply;
  }

  .nav-name {
    font-family: 'Caveat', cursive;
    font-size: 1.25rem;
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
  }

  /* ── PHOTO CLUSTER: left side, vertically centered ── */
  /* In the wireframe the cluster sits ~20% from left, 
     vertically centered slightly above mid */
  .photo-cluster {
    position: absolute;
    left: 13%;
    top: 50%;
    transform: translateY(-52%);
    width: 220px;
    height: 270px;
  }

  /* Portrait photo: upper-right of cluster */
  .photo-you {
    position: absolute;
    top: 0;
    left: 30px;
    width: 158px;
    height: 192px;
    object-fit: cover;
    object-position: center top;
    border-radius: 22px;
    z-index: 2;
    background: #b8c8d8;
  }

  /* Plant photo: lower-left, overlapping portrait */
  .photo-plant {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 124px;
    height: 142px;
    object-fit: cover;
    border-radius: 16px;
    z-index: 3;
    opacity: 0.92;
    background: #c5d4bc;
  }

  /* >>> arrows: right side of portrait */
  .arrows {
    position: absolute;
    top: 88px;
    left: 184px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    z-index: 4;
  }

  .arrows span {
    font-family: 'Caveat', cursive;
    font-size: 1rem;
    color: #888;
    letter-spacing: -0.06em;
    line-height: 1.5;
  }

  /* ── NAV LINKS: right half, vertically centered ── */
  /* In wireframe they sit roughly centered-right, 
     Music at ~35% from top, Ehoro at ~50% */
  .site-links {
    position: absolute;
    left: 52%;
    top: 50%;
    transform: translateY(-60%);
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .site-links li a {
    font-family: 'Caveat', cursive;
    font-size: 2.6rem;
    font-weight: 500;
    color: #1a1a1a;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
    transition: color 0.15s;
    white-space: nowrap;
  }

  .site-links li a .arr {
    color: #999;
    font-size: 1.6rem;
    letter-spacing: -0.06em;
    font-weight: 400;
  }

  .site-links li a:hover { color: #555; }

  /* ── 3D AVATAR: bottom-right, cropped off edge ── */
  .avatar-wrap {
    position: absolute;
    bottom: -10px;
    right: -10px;
    width: 30vw;
    max-width: 320px;
    min-width: 180px;
    z-index: 5;
    pointer-events: none;
  }

  .avatar-wrap img {
    width: 100%;
    display: block;
    object-fit: contain;
    object-position: bottom right;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    body {
      height: 100svh;
      overflow: hidden;
    }

    nav {
      top: 16px;
      left: 18px;
    }

    .nav-logo { height: 28px; }
    .nav-name { font-size: 1.1rem; }

    /* Photo cluster: left, vertically ~40% down */
    .photo-cluster {
      left: 6%;
      top: 46%;
      transform: translateY(-50%);
      width: 170px;
      height: 210px;
    }

    .photo-you {
      left: 20px;
      width: 124px;
      height: 150px;
      border-radius: 18px;
    }

    .photo-plant {
      width: 96px;
      height: 110px;
      border-radius: 13px;
    }

    .arrows {
      top: 68px;
      left: 140px;
    }

    .arrows span { font-size: 0.9rem; }

    /* Links: right side */
    .site-links {
      left: 50%;
      top: 44%;
      transform: translateY(-55%);
      gap: 1rem;
    }

    .site-links li a {
      font-size: 1.9rem;
    }

    .site-links li a .arr {
      font-size: 1.2rem;
    }

    /* Avatar smaller on mobile, still bottom-right */
    .avatar-wrap {
      width: 42vw;
      min-width: 130px;
      bottom: -5px;
      right: -5px;
    }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }
  .photo-cluster { animation: fadeIn 0.6s ease 0.1s both; }
  .site-links    { animation: fadeIn 0.6s ease 0.2s both; }
  .avatar-wrap   { animation: fadeIn 0.7s ease 0.35s both; }
</style>
</head>
<body>

<nav>
  <img class="nav-logo" src="/ube_logo.png" alt="Prince Ube logo">
  <a href="/" class="nav-name">Prince Ube</a>

<!-- PHOTO CLUSTER -->
<div class="photo-cluster">
  <img class="photo-you"
    src="/og-image.jpeg"
    alt="Prince Ube">
  <img class="photo-plant"
    src="/zombie-village/cover.jpg"
    alt="plant">
  <div class="arrows">
    <span>>>></span>
    <span>>>></span>
    <span>>>></span>
  </div>
</div>

<!-- NAV LINKS -->
<ul class="site-links">
  <li>
    <a href="https://linktr.ee/princeube" target="_blank" rel="noopener">
      <span class="arr">>>></span> Music
    </a>
  </li>
  <li>
    <a href="/ehorovillage/">
      <span class="arr">>>></span> Ehorovillage
    </a>
  </li>
</ul>

<!-- 3D AVATAR -->
<div class="avatar-wrap">
  <img src="/IMG_0406.PNG" alt="Prince Ube 3D avatar" onerror="this.style.display='none'">
</div>

</body>
